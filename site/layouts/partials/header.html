<div class="w-100 pv3 ph3 ph5-ns ph6-l flex justify-between items-center">

  <a href="/">
    <img id="logo" class="w4" src="/mathbrix-logo-tm.jpg">
  </a>

  <div class="dn db-l">
    <a class="mh3 link mb-blue dim tracked" href="/team">The Team</a>
    <a id="product" class="mh3 link mb-blue dim tracked">Games</a>
    <a class="mh3 link mb-blue dim tracked" href="/research">Research</a>
    <a class="mh3 link mb-blue dim tracked" href="/faq">FAQ</a>
    <a class="mh3 link mb-blue dim tracked" href="/blog">Blog</a>
  </div>

  <a id="show-mobile-nav" class="db dn-l" href="#">
    <img class="w3" src="/hamburger-menu.png">
  </a>

  <ul id="product-dropdown" class="pa0 ma0 list f5">
    <li><a class="link mb-blue dim tracked" href="/games">Games by Grade Level</a></li>
    <li><a class="link mb-blue dim tracked" href="/skills">Games by Skill Area</a></li>
  </ul>

</div>

<nav id="mobile-nav" class="w5 pa3">
  <div class="flex justify-end">
    <a id="hide-mobile-nav" href="#">
      <img class="w1" src="/close.png">
    </a>
  </div>
  
  <div class="mb4">
    <h4 class="mt0 mb3 f4 fw4"><a class="link black bt-0 br-0 bl-0 bb b--dashed dim ttu tracked" href="/games">Games</a></h4>
    <ul class="pl1 list">
      {{ range $.Site.Data.grades }}
        <li class="mb2"><a class="link mb-blue dim tracked" href="/{{ urlize .name }}">{{ .alternate_name_2 }} Games</a></li>
      {{ end }}
    </ul>
  </div>
  
  <div class="mv4">
    <h4 class="mt0 mb3 f4 fw4"><a class="link black bt-0 br-0 bl-0 bb b--dashed dim ttu tracked" href="/skills">Skills</a></h4>
    <ul class="pl1 list">
      {{ range $.Site.Data.skills }}
        <li class="mb2"><a class="link mb-blue dim tracked" href="/skills/{{ urlize .category.name }}">{{ .category.name }}</a></li>
      {{ end }}
    </ul>
  </div>
  
  <div class="mv4">
    <a class="link black bt-0 br-0 bl-0 bb b--dashed dim ttu tracked f4" href="/team">The Team</a>
  </div>
  <div class="mv4">
    <a class="link black bt-0 br-0 bl-0 bb b--dashed dim ttu tracked f4" href="/research">Research</a>
  </div>
  <div class="mv4">
    <a class="link black bt-0 br-0 bl-0 bb b--dashed dim ttu tracked f4" href="/faq">FAQ</a>
  </div>
  <div class="mv4">
    <a class="link black bt-0 br-0 bl-0 bb b--dashed dim ttu tracked f4" href="/blog">Blog</a>
  </div>
</nav>
